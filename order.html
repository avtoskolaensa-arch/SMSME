<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SMS შეკვეთის ფორმა</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, Helvetica, sans-serif;
      background: radial-gradient(circle at 20% 10%, rgba(124,58,237,.18), transparent 30%),
                  radial-gradient(circle at 80% 90%, rgba(59,130,246,.18), transparent 30%),
                  linear-gradient(135deg,#0f172a,#1e1b4b);
      min-height: 100vh;
      color: #0f172a;
      padding: 24px 14px;
    }
    .wrap { max-width: 980px; margin: 0 auto; }
    .hero { text-align:center; margin-bottom:20px; color:#fff; }
    .hero h1 { font-size:36px; margin-bottom:8px; }
    .hero p { color: rgba(255,255,255,.85); }
    .grid {
      display:grid;
      grid-template-columns: 1.1fr .9fr;
      gap:20px;
    }
    .card, .side {
      background: rgba(255,255,255,.96);
      border-radius: 22px;
      box-shadow: 0 18px 50px rgba(0,0,0,.18);
      padding: 22px;
    }
    .title { font-size:22px; font-weight:800; margin-bottom:6px; }
    .sub { color:#6b7280; margin-bottom:18px; font-size:14px; }
    form { display:grid; gap:14px; }
    .row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    label { font-size:13px; font-weight:700; margin-bottom:6px; display:block; }
    input, textarea {
      width:100%;
      border:1px solid #d1d5db;
      border-radius:12px;
      padding:12px;
      font-size:14px;
      outline:none;
    }
    textarea { min-height:100px; resize:vertical; }
    input:focus, textarea:focus {
      border-color:#7c3aed;
      box-shadow:0 0 0 3px rgba(124,58,237,.15);
    }
    .check {
      display:flex; gap:8px;
      background:#f9fafb;
      border:1px solid #e5e7eb;
      border-radius:12px;
      padding:10px;
      font-size:13px;
    }
    .btn {
      border:none;
      border-radius:14px;
      padding:14px;
      font-weight:800;
      background: linear-gradient(135deg,#7c3aed,#2563eb);
      color:#fff;
      cursor:pointer;
    }
    .btn:disabled { opacity:.7; cursor:not-allowed; }
    .status { display:none; margin-top:8px; padding:10px; border-radius:10px; font-size:13px; font-weight:700; }
    .status.success { display:block; background:#ecfdf5; color:#065f46; }
    .status.error { display:block; background:#fef2f2; color:#991b1b; }
    .side h3 { margin-bottom:10px; }
    .item { background:#f9fafb; border:1px solid #e5e7eb; border-radius:12px; padding:10px; margin-bottom:10px; font-size:13px; }
    .preview { margin-top:12px; background:#f8fafc; border:1px solid #e5e7eb; border-radius:12px; padding:10px; font-size:13px; }
    @media (max-width: 860px) {
      .grid, .row { grid-template-columns:1fr; }
      .hero h1 { font-size:28px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <h1>SMS შეკვეთის ფორმა</h1>
      <p>შეავსე ფორმა და გააგზავნე შეკვეთა</p>
    </div>

    <div class="grid">
      <div class="card">
        <div class="title">დეტალები</div>
        <div class="sub">შეავსე ყველა ველი სწორად</div>

        <form id="f">
          <div class="row">
            <div>
              <label>სახელი და გვარი</label>
              <input id="fullname" required>
            </div>
            <div>
              <label>ელფოსტა</label>
              <input id="email" type="email" required>
            </div>
          </div>

          <div class="row">
            <div>
              <label>ნომერი</label>
              <input id="phone" required>
            </div>
            <div>
              <label>დრო</label>
              <input id="sendtime" type="datetime-local">
            </div>
          </div>

          <div>
            <label>ტექსტი</label>
            <textarea id="message" required></textarea>
          </div>

          <div>
            <label>კომენტარი</label>
            <textarea id="comment"></textarea>
          </div>

          <div class="check">
            <input type="checkbox" required>
            <div>ვეთანხმები წესებს</div>
          </div>

          <button class="btn" id="btn">გაგზავნა</button>
          <div id="status" class="status"></div>
        </form>
      </div>

      <div class="side">
        <h3>ინფორმაცია</h3>
        <div class="item"><strong>1.</strong> შეავსე ფორმა</div>
        <div class="item"><strong>2.</strong> დაელოდე დადასტურებას</div>
        <div class="item"><strong>3.</strong> SMS გაიგზავნება</div>

        <div class="preview">
          <div>სახელი: <span id="p1">-</span></div>
          <div>ელფოსტა: <span id="p2">-</span></div>
          <div>ნომერი: <span id="p3">-</span></div>
          <div>ტექსტი: <span id="p4">-</span></div>
        </div>
      </div>
    </div>
  </div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxfcQ9cQgkBBzR48cdRUKcxvMlGkSJ2OQvg1LD9SjUGrchnCSyfNdxN367taDoDhYEq/exec";

const f = document.getElementById("f");
const statusBox = document.getElementById("status");
const btn = document.getElementById("btn");

const fullname = document.getElementById("fullname");
const email = document.getElementById("email");
const phone = document.getElementById("phone");
const message = document.getElementById("message");

function prev(){
  document.getElementById("p1").textContent = fullname.value || "-";
  document.getElementById("p2").textContent = email.value || "-";
  document.getElementById("p3").textContent = phone.value || "-";
  document.getElementById("p4").textContent = message.value || "-";
}

[fullname,email,phone,message].forEach(e=>e.addEventListener("input",prev));

f.addEventListener("submit", async (e)=>{
  e.preventDefault();
  btn.disabled = true;
  btn.textContent = "იგზავნება...";

  const payload = {
    fullname: fullname.value,
    email: email.value,
    phone: phone.value,
    sendtime: document.getElementById("sendtime").value,
    message: message.value,
    comment: document.getElementById("comment").value
  };

  try {
    const res = await fetch(SCRIPT_URL, {
      method:"POST",
      headers:{"Content-Type":"text/plain"},
      body: JSON.stringify(payload)
    });

    const data = await res.json();

    if(data.status==="success"){
      statusBox.className="status success";
      statusBox.textContent="გაიგზავნა წარმატებით";
      f.reset(); prev();
    } else {
      throw new Error();
    }
  } catch(e){
    statusBox.className="status error";
    statusBox.textContent="შეცდომა";
  }

  btn.disabled = false;
  btn.textContent = "გაგზავნა";
});

prev();
</script>
</body>
</html>
